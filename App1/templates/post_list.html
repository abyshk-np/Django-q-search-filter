    <style>
        

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}


body {
    background: #f4f6f9;
    padding: 20px;
}


h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}

.search-form {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 25px;
}


.search-form input,
.search-form select {
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 14px;
}

.search-form button {
    padding: 8px 15px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.search-form button:hover {
    background: #1d4ed8;
}


ul {
    list-style: none;
    max-width: 600px;
    margin: auto;
}


li {
    
    background: white;
    padding: 5px;
    margin-bottom: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}


li h3 {
    color: #111;
    margin-bottom: 8px;
}


li p {
   
    color: #555;
    margin-bottom: 5px;
}

    color: #000;

    </style>
    <body>
        <h1>Search and Filter<h1>
        <form method="get" class="search-form">
            <input type="text" name="q" placeholder="search" value="{{ query }}">
            
        <select name="category">
            <option value="">All</option>
            <option value="Tech" {% if category == "Tech" %} selected {% endif %}>Tech</option>
            <option value="Education" {% if category == "Education" %}selected{% endif %}>Student</option>
            <option value="News" {% if category == "News" %}selected{% endif %}>News</option>
        </select>

            
        <button type="submit">Search</button>

        </form>
        <ul>
            {% for post in posts %}
            <li>
                <h3>{{post.title}}<h3>
                <p>{{post.content}}</p>
                <p><strong>Category:</strong>{{post.category}}</p>
            </li>
            {% empty %}
            <li>No posts found</li>
                {% endfor %}
            </ul>
        




        
    </body>
